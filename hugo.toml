baseURL = 'https://jakeinsight.com'
defaultContentLanguage = 'en'
title = "Jake's Insights"
theme = 'PaperMod'
timeZone = 'Asia/Seoul'
[services.googleAnalytics]
  ID = 'G-3ML8CHS112'

# Performance optimization
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff.html]
    keepWhitespace = false

# Image processing optimization
[imaging]
  quality = 85
  resampleFilter = "Lanczos"
  anchor = "Smart"

# Build performance
[build]
  writeStats = true
  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx)"
    target = "(js|scripts|javascript)"
  [[build.cachebusters]]
    source = "assets/.*\\.(.*)$"
    target = "$1"

[pagination]
pagerSize = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  technology = "technologies"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    contentDir = "content/en"
    title = "Jake's Insights"

    [[languages.en.menu.main]]
      name = "🏠 Home"
      url = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "📚 All Posts"
      url = "/all-posts/"
      weight = 2

    [[languages.en.menu.main]]
      name = "💻 Tech"
      url = "/categories/tech/"
      weight = 3

    [[languages.en.menu.main]]
      name = "💼 Business"
      url = "/categories/business/"
      weight = 4

    [[languages.en.menu.main]]
      name = "🌍 Society"
      url = "/categories/society/"
      weight = 5

    [[languages.en.menu.main]]
      name = "🎬 Entertainment"
      url = "/categories/entertainment/"
      weight = 6

    [[languages.en.menu.main]]
      name = "⚽ Sports"
      url = "/categories/sports/"
      weight = 8

  [languages.ko]
    languageName = "한국어"
    languageCode = "ko-kr"
    weight = 2
    contentDir = "content/ko"
    title = "Jake's Insights"

    [[languages.ko.menu.main]]
      name = "🏠 홈"
      url = "/ko/"
      weight = 1

    [[languages.ko.menu.main]]
      name = "📚 전체 글"
      url = "/ko/all-posts/"
      weight = 2

    [[languages.ko.menu.main]]
      name = "💻 테크"
      url = "/ko/categories/tech/"
      weight = 3

    [[languages.ko.menu.main]]
      name = "💼 비즈니스"
      url = "/ko/categories/business/"
      weight = 4

    [[languages.ko.menu.main]]
      name = "🌍 사회"
      url = "/ko/categories/society/"
      weight = 5

    [[languages.ko.menu.main]]
      name = "🎬 엔터"
      url = "/ko/categories/entertainment/"
      weight = 6

    [[languages.ko.menu.main]]
      name = "⚽ 스포츠"
      url = "/ko/categories/sports/"
      weight = 8

[params]
  env = "production"
  description = "In-depth tech and SaaS analysis with data-driven reports in English and Korean"
  keywords = ["tech analysis", "SaaS insights", "data-driven reports", "technology trends", "software analysis"]
  author = "Jake Park"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  homeInfoParams.Title = "Welcome"
  homeInfoParams.Content = "In-depth tech analysis and data-driven reports"
  naverVerification = "ab8a8be3ea59eba75ed5d3d53946551f4541a68a"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[params.profileMode.buttons]]
  name = "📚 All Posts"
  url = "/all-posts"

[[params.profileMode.buttons]]
  name = "💻 Tech"
  url = "/categories/tech"

[[params.profileMode.buttons]]
  name = "💼 Business"
  url = "/categories/business"

[[params.profileMode.buttons]]
  name = "🌍 Society"
  url = "/categories/society"

[[params.profileMode.buttons]]
  name = "🎬 Entertainment"
  url = "/categories/entertainment"

[[params.profileMode.buttons]]
  name = "⚽ Sports"
  url = "/categories/sports"

[related]
  includeNewer = true
  threshold = 80
  toLower = false

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "date"
    weight = 10

  [[related.indices]]
    name = "technologies"
    weight = 70
