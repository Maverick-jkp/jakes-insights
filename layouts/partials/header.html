<header class="site-header" id="site-header">
  <div class="header-inner">
    <div class="brand-group">
      <a href="{{ "/" | relLangURL }}" class="brand">
        <span class="brand-primary">JAKE'S</span>
        <span class="brand-secondary">INSIGHTS</span>
      </a>
      <p class="tagline">{{ if eq .Language.Lang "ko" }}커뮤니티 인사이트로 읽는 테크 분석{{ else }}In-depth tech analysis with community insights{{ end }}</p>
    </div>

    {{/* Mobile hamburger — hidden on desktop via CSS */}}
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false" type="button">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <nav class="header-nav" id="header-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}"
         {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>
        {{ .Name }}
      </a>
      {{ end }}
      <span class="nav-divider" aria-hidden="true"></span>
      <a href="/en/" class="nav-lang {{ if eq .Language.Lang "en" }}active{{ end }}" lang="en" hreflang="en">EN</a>
      <a href="/ko/" class="nav-lang {{ if eq .Language.Lang "ko" }}active{{ end }}" lang="ko" hreflang="ko">한국어</a>
    </nav>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
      <span class="theme-icon">☀️</span>
    </button>
  </div>
</header>

<script>
(function() {
  var stored = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = stored || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('theme-toggle');
    var icon = btn && btn.querySelector('.theme-icon');
    if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    if (btn) btn.addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      icon.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    // Mobile nav toggle
    var navToggle = document.getElementById('nav-toggle');
    var nav = document.getElementById('header-nav');
    if (navToggle && nav) {
      navToggle.addEventListener('click', function() {
        var open = nav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  });

  // Sticky header shadow on scroll
  window.addEventListener('scroll', function() {
    var header = document.getElementById('site-header');
    if (header) header.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });
})();
</script>
