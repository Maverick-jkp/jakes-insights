name: Daily Side-Income Content

on:
  schedule:
    # Run daily at midnight KST (15:00 UTC previous day)
    - cron: '0 15 * * *'    # 00:00 KST (15:00 UTC)
  workflow_dispatch:
    inputs:
      count:
        description: 'Posts per language (EN + KO independently)'
        required: false
        default: '2'
      lang:
        description: 'Language: en, ko, or both'
        required: false
        default: 'both'
      dry_run:
        description: 'Dry run (show keywords only, no generation)'
        required: false
        default: 'false'

jobs:
  generate-side-income:
    name: Generate Side-Income Posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate side-income content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          echo "::add-mask::${{ secrets.ANTHROPIC_API_KEY }}"
          echo "::add-mask::${{ secrets.UNSPLASH_ACCESS_KEY }}"

          COUNT="${{ github.event.inputs.count || '2' }}"
          LANG="${{ github.event.inputs.lang || 'both' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python scripts/generate_side_income.py --count $COUNT --lang $LANG"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit and push
        id: commit_changes
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@jakes-tech-insights.com"

          git add content/en/side-income/ || true
          git add content/ko/side-income/ || true
          git add data/side_income_used.json || true
          git add static/images/ || true

          if ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "🤖 Side-income posts: $TIMESTAMP"

            echo "🔄 Pulling latest before push..."
            git pull --no-rebase origin main || true

            MAX_RETRIES=3
            RETRY_COUNT=0
            PUSH_SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push origin main; then
                PUSH_SUCCESS=true
                echo "✅ Side-income posts pushed successfully"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⚠️ Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                  sleep $((RETRY_COUNT * 2))
                  git pull --rebase origin main
                fi
              fi
            done

            if [ "$PUSH_SUCCESS" = true ]; then
              echo "pushed=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Push failed after $MAX_RETRIES attempts"
              echo "pushed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "⚠️ No changes to commit (dry-run or generation failed)"
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify Google Indexing API
        if: steps.commit_changes.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_INDEXING_CREDENTIALS" ]; then
            pip install google-auth google-api-python-client
            mkdir -p credentials
            echo "$GOOGLE_INDEXING_CREDENTIALS" > credentials/google-indexing-credentials.json
            python scripts/google_indexing.py --days 1 --force
            rm -f credentials/google-indexing-credentials.json
            echo "✅ Google Indexing API notified"
          else
            echo "ℹ️  Google Indexing credentials not configured (optional)"
          fi

      - name: Summary
        run: |
          if [ "${{ steps.commit_changes.outputs.pushed }}" = "true" ]; then
            echo "✅ Side-income posts deployed"
            echo "🔗 EN: https://jakeinsight.com/side-income/"
            echo "🔗 KO: https://jakeinsight.com/ko/side-income/"
          else
            echo "⚠️ No posts deployed (check generation logs)"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Side-income generation failed. Check logs."
