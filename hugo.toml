baseURL = 'https://jakeinsight.com'
defaultContentLanguage = 'en'
title = "Jake's Insights"
theme = 'PaperMod'
timeZone = 'Asia/Seoul'
[services.googleAnalytics]
  ID = 'G-3ML8CHS112'

# Performance optimization
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff.html]
    keepWhitespace = false

# Image processing optimization
[imaging]
  quality = 85
  resampleFilter = "Lanczos"
  anchor = "Smart"

# Build performance
[build]
  writeStats = true
  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx)"
    target = "(js|scripts|javascript)"
  [[build.cachebusters]]
    source = "assets/.*\\.(.*)$"
    target = "$1"

[pagination]
pagerSize = 50

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    contentDir = "content/en"
    title = "Jake's Insights"

    [[languages.en.menu.main]]
      name = "🏠 Home"
      url = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "🤖 AI"
      url = "/ai/"
      weight = 2

    [[languages.en.menu.main]]
      name = "⚡ Productivity"
      url = "/productivity/"
      weight = 3

    [[languages.en.menu.main]]
      name = "🌐 Tech Economy"
      url = "/tech-economy/"
      weight = 4

    [[languages.en.menu.main]]
      name = "🛍️ Buying Guide"
      url = "/buying-guide/"
      weight = 5

    [[languages.en.menu.main]]
      name = "💰 Side Income"
      url = "/side-income/"
      weight = 6

    [[languages.en.menu.main]]
      name = "📚 All Posts"
      url = "/all-posts/"
      weight = 7


  [languages.ko]
    languageName = "한국어"
    languageCode = "ko-kr"
    weight = 2
    contentDir = "content/ko"
    title = "Jake's Insights"

    [[languages.ko.menu.main]]
      name = "🏠 홈"
      url = "/ko/"
      weight = 1

    [[languages.ko.menu.main]]
      name = "🤖 AI"
      url = "/ko/ai/"
      weight = 2

    [[languages.ko.menu.main]]
      name = "⚡ 생산성"
      url = "/ko/productivity/"
      weight = 3

    [[languages.ko.menu.main]]
      name = "🌐 테크 경제"
      url = "/ko/tech-economy/"
      weight = 4

    [[languages.ko.menu.main]]
      name = "🛍️ 구매 가이드"
      url = "/ko/buying-guide/"
      weight = 5

    [[languages.ko.menu.main]]
      name = "💰 부업"
      url = "/ko/side-income/"
      weight = 6

    [[languages.ko.menu.main]]
      name = "📚 전체 글"
      url = "/ko/all-posts/"
      weight = 7


[params]
  env = "production"
  description = "In-depth tech and SaaS analysis with data-driven reports in English and Korean"
  keywords = ["tech analysis", "SaaS insights", "data-driven reports", "technology trends", "software analysis"]
  author = "Jake Park"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  homeInfoParams.Title = "Welcome"
  homeInfoParams.Content = "In-depth tech analysis and data-driven reports"
  naverVerification = "ab8a8be3ea59eba75ed5d3d53946551f4541a68a"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[params.profileMode.buttons]]
  name = "📚 All Posts"
  url = "/all-posts"

[[params.profileMode.buttons]]
  name = "🤖 AI"
  url = "/ai"


[related]
  includeNewer = true
  threshold = 80
  toLower = false

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "date"
    weight = 10

